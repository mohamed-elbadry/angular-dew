<!--landing-->
<div class="pb-5">
    <div class="container-fluid">
        <div class="landing bg-shop rounded-bottom-4 pt-3 position-relative mh-700">
            <div class="row mh-700">
                <div class="col-12">
                    <div class="d-flex align-items-end justify-content-center h-100">
                        <img src="{{ featuredProduct?.image }}" alt="pic"
                            class="img-fluid position-absolute bottom-0 elbow">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<!--end-landing-->
<!-- start our product -->
<div class="our-product py-5">
    <div class="container">

        <div class="text-center">
            <h2 class="text-perf fs-36 fw-regular mb-3">
                Our best seller products
            </h2>
        </div>

        <div class="row">

            <div class="col-lg-4 col-md-4 col-sm-6 py-4 " *ngFor="let product of products.slice(0, 6)">

                <div class="card border-0 h-100">

                    <div class="image p-5 bg-text rounded-4 position-relative">

                        <img [src]="product.image" class="img-fluid product-img" />

                        <div class="position-absolute" style="top: 22px; inset-inline-start: 20px;">
                            <span class="bg-fully text-luci px-4 py-2 rounded-2 fs-18">
                                {{ product.category }}
                            </span>
                        </div>

                    </div>

                    <div class="d-flex flex-column gap-3 py-4">

                        <h2 class="fs-24 fw-regular text-truncate" (click)="navigateToProduct(product.id)">
                            {{ product.title }}
                        </h2>

                        <p class="text-forth fs-20 fw-mont text-truncate">
                            {{ product.description }}
                        </p>

                    </div>

                    <div class="d-flex justify-content-between align-items-center border p-2 py-3 hover-black-white">

                        <a (click)="navigateToProduct(product.id)"
                       style="cursor:pointer"
                       class="text-black fs-18 fw-regular ms-2">
                        Shop now
                    </a>

                        <p class="p-0 m-0 d-flex align-items-center me-2">
                            <span class="fs-22 fw-regular">
                                {{ product.price }}
                            </span>
                            <img src="img/icons/riyal.png" style="width: 25px;">
                        </p>

                    </div>

                </div>
            </div>


        </div>
    </div>
</div>
<!-- end our product -->
<!-- start-gift-->
<div class="container">
    <div class="gift py-3">
        <div class="row g-0 w-100 align-items-stretch">
            <div class="col-md-7 col-12">

                    <h3 class="pt-3 fs-36 fw-regular text-full">It’s a feeling – Gift kit</h3>
                    <h4 class="pt-3 fs-24 fw-regular text-perf lin-120">
                        {{ giftProduct.category }}
                    </h4>
                    <p class="pt-3 fs-22 fw-mont text-look lin-120">
                        {{ giftProduct.description }}
                    </p>

                    <div
