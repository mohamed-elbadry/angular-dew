<!--landing-->
<div class="container-fluid">
    <div class="sign bg-text rounded-bottom-4">
        <div class="row ">
            <div class="col-md-6 col-12">
                <div class="container">
                    <div class="d-flex flex-column  ps-5 pe-5 h-100">
                        <div class="ps-5">
                            <div class="mt-5 pt-5">
                                <h3 class="fs-24 fw-regular fw-arp-bold">Sign in</h3>
                                <p class="fw-mont fs-18 pb-5">Sign In to Access Your Account.</p>

                            </div>
                            <form>
                                <div class="row">
                                    <div class="col-lg-12 col-12">
                                        <div class="mb-3 mt-3 shadow-bottom">
                                            <div class="d-flex align-items-center bg-white p-2 rounded-4">
                                                <input type="email" [(ngModel)]="email" name="email"
                                                    class="form-control" placeholder="email">
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-lg-12 col-12">
                                        <div class="mb-3 shadow-bottom">
                                            <div class="d-flex align-items-center bg-white p-2 rounded-4">

                                                <input [type]="showPassword ? 'text' : 'password'"
                                                    [(ngModel)]="password" name="password" class="form-control"
                                                    placeholder="password">

                                                <img src="img/icons/eye.svg" alt="eye" class="me-2"
                                                    style="cursor: pointer;" (click)="showPassword = !showPassword">

                                            </div>
                                        </div>
                                    </div>
                                    <div
                                        class="login_submit ">
                                        <div>
                                            <button type="submit" (click)="onLogin()"
                                                class="w-100 d-block py-3 px-4 bg-sign text-white rounded-4 fs-18 text-center fw-arp-bold border-0">
                                                Sign in
                                            </button>
                                            <!-- <p class="fw-mont fs-16 text-forth pt-3">Don’t have an account?<a
                                                    class="text-black  fs-18 px-2 text-decoration-underline">Sign up</a>
                                            </p> -->
                                        </div>

                                        <!-- <a href="reset password.html" class="fw-mont fs-16 me-3 text-forg text-decoration-underline">Forgot password?</a> -->
                                        <!-- <div class="d-flex flex-column gap-3">

                                            <a (click)="goTopassword()"
                                                class="fw-mont fs-16 me-3 text-forg text-decoration-underline">
                                                Forgot password?
                                            </a>

                                            <a (click)="goToRegister()"
                                                class="w-100 d-block py-3 px-4 bg-sign text-white rounded-4 fs-18 text-center fw-arp-bold">
                                                Register
                                            </a>

                                        </div> -->
                                    </div>


                                </div>
                            </form>
                        </div>

                    </div>


                </div>

            </div>
              <div class="col-md-6 col-12 order-md-1 order-0">
                        <img src="img/landing/log-in.jpeg" alt="landing" class="img-fluid h-550 w-100">
                </div>


            <!-- <div class="col-md-6 col-12">
                <div class="image d-flex align-items-center justify-content-center h-100 py-3">

                    <img [src]="fixedProduct?.image || 'img/product/dew-cear.png'" alt="product"
                        class="img-fluid object-fit-contain">

                </div>
            </div> -->
        </div>
    </div>
</div>
<!--end-landing-->
